services:
  travelsafe-frontend:
    build:
      context: .
      target: prod
    container_name: travelsafe-frontend
    env_file:
      - ./.env
    environment:
      - NODE_ENV=prod
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=2",
          "--spider",
          "http://localhost:3000/favicon.ico",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
  nginx:
    image: nginx:1.27-alpine
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - travelsafe-frontend
